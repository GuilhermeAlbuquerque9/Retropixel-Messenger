<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Retropixel Messenger™</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="messenger-window">

  <!-- TOPO -->
  <div class="topbar">
    <span>Retropixel Messenger™</span>

    <div class="top-buttons">
      <button id="sobreBtn">Sobre</button>
      <button id="configBtn">Config</button>
      <button id="termosBtn">Termos</button>
      <button id="logoutBtn">Sair</button>
    </div>
  </div>

  <!-- CONTEÚDO -->
  <div class="main">

    <!-- CONTATOS -->
    <div class="sidebar">
      <button id="addContactBtn">+ Adicionar contato</button>
      <div id="contacts"></div>
    </div>

    <!-- CHAT -->
    <div class="chat">

      <div id="chatTitle" class="chat-title">
        Selecione um contato
      </div>

      <div id="messages" class="messages"></div>

      <div class="input-area">
        <input id="messageInput" placeholder="Digite uma mensagem...">
        <button id="sendBtn">Enviar</button>
        <button id="nudgeBtn">⚡</button>
      </div>

    </div>

  </div>

</div>

<!-- SONS -->
<audio id="clickSound" src="assets/click.wav"></audio>
<audio id="nudgeSound" src="assets/nudge.wav"></audio>

<script type="module" src="app.js"></script>
</body>
</html>
