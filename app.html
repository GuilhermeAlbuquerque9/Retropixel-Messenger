<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Retropixel Messenger™</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="rp-bg">

  <div class="messenger-window">

    <div class="top-bar">
      Retropixel Messenger™

      <div>
        <button id="sobreBtn">Sobre</button>
        <button id="configBtn">Config</button>
        <button id="termosBtn">Termos</button>
        <button id="logoutBtn">Sair</button>
      </div>
    </div>

    <div class="messenger-body">

      <div class="contacts-panel">
        <div class="user-info">🟢 Online</div>

        <button class="add-contact-btn" id="addContactBtn">
          ➕ Adicionar contato
        </button>

        <div id="contacts" class="contacts-list"></div>
      </div>

      <div class="chat-panel">

        <div id="chatTitle" class="chat-header">
          Selecione um contato
        </div>

        <div id="messages" class="messages"></div>

        <div class="chat-input">
          <input id="messageInput" placeholder="Digite uma mensagem...">
          <button id="sendBtn">Enviar</button>
          <button id="nudgeBtn">⚡</button>
        </div>

      </div>

    </div>

  </div>

  <!-- 🔊 ÁUDIOS -->
  <audio id="clickSound" src="assets/click.wav"></audio>
  <audio id="sendSound" src="assets/aeroclick.wav"></audio>
  <audio id="nudgeSound" src="assets/nudge.wav"></audio>

  <script type="module" src="app.js"></script>

</body>
</html>
