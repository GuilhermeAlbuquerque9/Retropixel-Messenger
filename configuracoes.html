<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Configurações</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="messenger-window">

  <div class="topbar">
    <span>Configurações</span>
    <button onclick="location.href='app.html'">← Voltar</button>
  </div>

  <div class="config-content">

    <label>Nome:</label>
    <input id="configName">

    <label>Status:</label>
    <select id="configStatus">
      <option value="online">🟢 Online</option>
      <option value="offline">🔴 Offline</option>
      <option value="dnd">⛔ Não perturbe</option>
      <option value="auto">🤖 Automático</option>
    </select>

    <label>Bio:</label>
    <textarea id="configBio"></textarea>

    <button onclick="updateProfile()">Salvar</button>

  </div>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
