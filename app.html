<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Retropixel Messenger™</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="rp-bg">

  <div class="messenger-window">

    <div class="top-bar">
      Retropixel Messenger™

      <div>
        <button onclick="location.href='sobre.html'">Sobre</button>
        <button onclick="location.href='configuracoes.html'">Config</button>
        <button onclick="location.href='termos.html'">Termos</button>
        <button onclick="logout()">Sair</button>
      </div>
    </div>

    <div class="messenger-body">

      <!-- CONTATOS -->
      <div class="contacts-panel">

        <div class="user-info">🟢 Online</div>

        <button class="add-contact-btn" onclick="addContact()">
          ➕ Adicionar contato
        </button>

        <div id="contacts" class="contacts-list"></div>

      </div>

      <!-- CHAT -->
      <div class="chat-panel">

        <div id="chatTitle" class="chat-header">
          Selecione um contato
        </div>

        <div id="messages" class="messages"></div>

        <div class="chat-input">
          <input id="messageInput" placeholder="Digite uma mensagem...">
          <button onclick="sendMessage()">Enviar</button>
          <button onclick="sendNudge()">⚡</button>
        </div>

      </div>

    </div>

  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
